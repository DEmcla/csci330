name: CSCI 330 submission checks

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  scope-check:
    name: Work stays in your week folder
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify changed files
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          [ -n "$base" ] || base="$(git rev-parse origin/main)"
          files="$(git diff --name-only "$base"...HEAD)"
          echo "Changed files:"; echo "$files"
          bad="$(echo "$files" | grep -vE '^assignments/CSCI330_[^/]+/week[0-9]+/' || true)"
          if [ -n "$bad" ]; then
            echo "::error::These files are outside an assignments/CSCI330_.../weekNN/ folder. Move your work into your own week folder:"
            echo "$bad"
            exit 1
          fi
          weeks="$(echo "$files" | sed -E 's#^(assignments/CSCI330_[^/]+/week[0-9]+)/.*#\1#' | sort -u)"
          if [ "$(echo "$weeks" | grep -c .)" -gt 1 ]; then
            echo "::error::One PR may change only one week folder. Found: $weeks"
            exit 1
          fi

  build-check:
    name: Your code compiles
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Compile the changed week folder
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          [ -n "$base" ] || base="$(git rev-parse origin/main)"
          dir="$(git diff --name-only "$base"...HEAD \
            | sed -E 's#^(assignments/CSCI330_[^/]+/week[0-9]+)/.*#\1#' | sort -u | head -1)"
          if [ -z "$dir" ]; then echo "No week folder changed; nothing to build."; exit 0; fi
          echo "Building $dir"
          cd "$dir"
          if [ -f CMakeLists.txt ]; then
            cmake -B build -DCMAKE_CXX_STANDARD=17 -DCMAKE_CXX_STANDARD_REQUIRED=ON
            cmake --build build
          else
            g++ -std=c++17 -Wall -Wextra *.cpp -o week_build
          fi
          echo "Build succeeded."
